<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Us – AFS Virtual Tutor Hub</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="../css/animations.css"/>
  <link rel="stylesheet" href="../css/responsive.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    /* ─── Global Dark & Gold Core Theme ─── */
    :root {
      --bg-dark: #0b0b0b;
      --card-bg: #121212;
      --panel-border: #222222;
      --gold: #FFD700;
      --gold-hover: #f0c800;
      --text-main: #e0e0e0;
      --text-muted: #888888;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
      background: var(--bg-dark); 
      color: var(--text-main);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .contact-wrapper {
      max-width: 1200px;
      margin: 60px auto;
      padding: 0 24px;
    }

    .contact-header {
      text-align: center;
      margin-bottom: 50px;
    }
    .contact-header h1 {
      font-size: 2.5rem;
      color: #fff;
      margin-bottom: 12px;
    }
    .contact-header h1 span {
      color: var(--gold);
    }
    .contact-header p {
      color: var(--text-muted);
      font-size: 1.05rem;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1.3fr;
      gap: 40px;
    }

    @media (max-width: 968px) {
      .contact-grid { grid-template-columns: 1fr; }
    }

    /* ─── Info Cards Sidebar ─── */
    .info-sidebar {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .info-card {
      background: var(--card-bg);
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      padding: 24px;
      display: flex;
      align-items: flex-start;
      gap: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .info-icon {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      background: rgba(255, 215, 0, 0.1);
      color: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
    }

    .info-details h3 {
      font-size: 1.1rem;
      color: #fff;
      margin-bottom: 6px;
    }
    .info-details p, .info-details a {
      font-size: 0.92rem;
      color: var(--text-muted);
      text-decoration: none;
      line-height: 1.5;
    }
    .info-details a:hover { color: var(--gold); }

    /* ─── Form Card Container ─── */
    .form-card {
      background: var(--card-bg);
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      padding: 40px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .form-title {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 24px;
      color: var(--gold);
      border-bottom: 1px solid #1f1f1f;
      padding-bottom: 12px;
    }

    .form-group {
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .form-group label {
      font-size: 0.88rem;
      color: #b3b3b3;
      font-weight: 500;
    }
    
    .form-control {
      width: 100%;
      background: #181818;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px 16px;
      color: #fff;
      font-size: 0.95rem;
      transition: all 0.2s;
    }
    .form-control:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 6px rgba(255, 215, 0, 0.15);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 576px) {
      .form-row { grid-template-columns: 1fr; gap: 0; }
    }

    .btn {
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: none;
      transition: all 0.2s;
      text-decoration: none;
    }
    .btn-primary {
      background: var(--gold);
      color: #000;
      width: 100%;
    }
    .btn-primary:hover {
      background: var(--gold-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(255, 215, 0, 0.2);
    }
    .btn-primary:disabled {
      background: #555;
      color: #888;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

<div id="page-loader" style="display:none;"><div class="loader-ring"></div></div>
<div id="toast-container"></div>

<div class="contact-wrapper">
  <div class="contact-header">
    <h1>Get In <span>Touch</span></h1>
    <p>Have questions about premium tutoring? Reach out to AFS Virtual Tutor Hub management desk.</p>
  </div>

  <div class="contact-grid">
    <div class="info-sidebar">
      <div class="info-card">
        <div class="info-icon"><i class="fa fa-building"></i></div>
        <div class="info-details">
          <h3>Main Executive Desk</h3>
          <p>AFS Virtual Tutor Hub Headquarters<br/>Peshawar, Khyber Pakhtunkhwa, Pakistan</p>
        </div>
      </div>
      <div class="info-card">
        <div class="info-icon"><i class="fa fa-user-tie"></i></div>
        <div class="info-details">
          <h3>Chief Administration</h3>
          <p>CEO Muhammad Awais</p>
        </div>
      </div>
    </div>

    <div class="form-card">
      <div class="form-title"><i class="fa fa-paper-plane"></i> Transmit Message Center</div>
      
      <form id="contact-form">
        <div class="form-row">
          <div class="form-group">
            <label>Your Full Name</label>
            <input type="text" id="contact-name" class="form-control" placeholder="Identity name" required/>
          </div>
          <div class="form-group">
            <label>Active Contact Line</label>
            <input type="tel" id="contact-phone" class="form-control" placeholder="e.g. 03179770764" required/>
          </div>
        </div>

        <div class="form-group">
          <label>Email Address Alignment</label>
          <input type="email" id="contact-email" class="form-control" placeholder="name@domain.com" required/>
        </div>

        <div class="form-group">
          <label>Subject Intent</label>
          <select id="contact-subject" class="form-control">
            <option value="General Query">General Query / Help</option>
            <option value="Student Registration">Student Registration Support</option>
            <option value="Faculty Application">Faculty Registration Process</option>
            <option value="Corporate / Partnership">Corporate Collaboration</option>
          </select>
        </div>

        <div class="form-group">
          <label>Detailed Message Context</label>
          <textarea id="contact-message" class="form-control" rows="5" placeholder="Elaborate your query context clearly..." required></textarea>
        </div>

        <br/>
        <button type="submit" class="btn btn-primary" id="btn-submit-contact">
          <i class="fa fa-paper-plane"></i> Submit Secure Ticket
        </button>
      </form>
    </div>
  </div>
</div>

<script src="../js/main.js"></script>
<script type="module">
import { getApps, initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAm01A9_MlZyuyk_7QsizK0_SpsLYJCNrw",
  authDomain: "afs-virtual-tutor-hub.firebaseapp.com",
  projectId: "afs-virtual-tutor-hub",
  storageBucket: "afs-virtual-tutor-hub.firebasestorage.app",
  messagingSenderId: "146570288811",
  appId: "1:146570288811:web:96da475a769c18696321ee"
};

const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApps()[0];
const db = getFirestore(app);

const contactForm = document.getElementById('contact-form');
if (contactForm) {
  contactForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const name    = document.getElementById('contact-name').value.trim();
    const phone   = document.getElementById('contact-phone').value.trim();
    const email   = document.getElementById('contact-email').value.trim();
    const subject = document.getElementById('contact-subject').value;
    const message = document.getElementById('contact-message').value.trim();
    
    const btn = document.getElementById('btn-submit-contact');
    if (btn) {
      btn.disabled = true;
      btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Submitting Ticket...';
    }

    try {
      await addDoc(collection(db, 'contact_messages'), {
        fullName: name,
        phone: phone,
        email: email,
        subject: subject,
        message: message,
        timestamp: serverTimestamp(),
        status: 'unread'
      });

      if (typeof showToast === 'function') {
        showToast('Your message has been sent to the Admin Panel! ✅', 'success');
      } else {
        alert('Your message has been sent to the Admin Panel! ✅');
      }
      
      contactForm.reset();

    } catch (dbError) {
      console.error(dbError);
      if (typeof showToast === 'function') {
        showToast('Error: ' + dbError.message, 'error');
      }
    }

    if (btn) {
      btn.disabled = false;
      btn.innerHTML = '<i class="fa fa-paper-plane"></i> Submit Secure Ticket';
    }
  });
}
</script>
</body>
</html>
