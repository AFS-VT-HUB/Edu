<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – AFS Virtual Tutor Hub</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="../css/animations.css"/>
  <link rel="stylesheet" href="../css/responsive.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  
  <style>
    /* Global Overrides for Theme Consistency */
    :root {
      --primary: #111111;
      --accent: #FFD700;
      --accent-hover: #e6c200;
    }

    /* Custom Input and Form Styling to blend with dark gradient background */
    .form-wrap {
      background: #111111 !important;
      border: 2px solid #FFD700 !important;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      border-radius: 12px;
      padding: 40px 30px;
      color: #ffffff;
      max-width: 450px;
    }

    .form-title {
      color: #FFD700 !important;
      font-weight: 700;
    }

    .form-sub {
      color: #cccccc !important;
    }

    .form-group label {
      color: #FFD700 !important;
      font-weight: 500;
    }

    .form-group input {
      background: #1a1a1a !important;
      border: 1px solid #333333 !important;
      color: #ffffff !important;
      border-radius: 6px;
      padding: 12px;
      transition: all 0.3s ease;
    }

    .form-group input:focus {
      border-color: #FFD700 !important;
      box-shadow: 0 0 8px rgba(255, 215, 0, 0.2);
    }

    /* Divider layout with gold accents */
    .divider span {
      background: #111111 !important;
      color: #888888 !important;
      padding: 0 15px;
    }
    .divider::before {
      background: #333333 !important;
    }

    /* Primary Login Button */
    .btn-primary {
      background: #FFD700 !important;
      color: #111111 !important;
      border: 2px solid #FFD700 !important;
      font-weight: 700;
      transition: all 0.3s ease;
    }
    .btn-primary:hover {
      background: #111111 !important;
      color: #FFD700 !important;
    }

    /* Google Authentication Button Override */
    .btn-google {
      background: #1a1a1a !important;
      border: 1px solid #333333 !important;
      color: #ffffff !important;
      transition: all 0.3s ease;
    }
    .btn-google:hover {
      border-color: #FFD700 !important;
      background: #222222 !important;
    }

    /* Footer Links alignment styling */
    .form-wrap p {
      color: #aaaaaa !important;
    }
    .form-wrap p a {
      color: #FFD700 !important;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }
    .form-wrap p a:hover {
      color: #ffffff !important;
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div id="page-loader"><div class="loader-ring"></div></div>
<div id="toast-container"></div>

<nav class="navbar" style="border-bottom: 1px solid #1c1a17; background: #0a0a0a;">
  <div class="navbar-inner">
    <a class="navbar-logo" href="../index.html">
      <div class="navbar-logo-icon" style="background: #111; color: #FFD700; border: 1px solid #FFD700;">AFS</div>
      <div class="navbar-logo-text" style="color: #fff;">Virtual Tutor Hub<span style="color: #FFD700;">Expert Teachers. Free Access.</span></div>
    </a>
    <div class="navbar-links">
      <a href="../index.html" style="color: #fff;">Home</a>
      <a href="faculty.html" style="color: #fff;">Faculty</a>
      <a href="student-register.html" class="btn btn-outline btn-sm" style="color: #FFD700 !important; border-color: #FFD700 !important;">Sign Up</a>
    </div>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </div>
  <div class="mobile-menu" id="mobile-menu" style="background: #0a0a0a;">
    <a href="../index.html" style="color: #fff;">Home</a>
    <a href="faculty.html" style="color: #fff;">Faculty</a>
    <a href="student-register.html" style="color: #FFD700;">Sign Up</a>
  </div>
</nav>

<section style="min-height:85vh; display:flex; align-items:center; justify-content:center; background: linear-gradient(135deg, #0a0a0a, #1a1a1a); padding:40px 24px;">
  <div class="form-wrap animate-fadeInUp">
    <div style="text-align:center;margin-bottom:24px">
      <div class="navbar-logo-icon" style="margin:0 auto 12px; width:48px; height:48px; font-size:1.3rem; background: #FFD700; color: #111; font-weight: bold; border: none;">AFS</div>
      <div class="form-title">Welcome Back!</div>
      <div class="form-sub">Login to your AFS Virtual Tutor Hub account</div>
    </div>

    <div class="social-login">
      <button class="btn btn-google btn-block" id="btn-google">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" style="display:inline;margin-right:8px"/>
        Continue with Google
      </button>
    </div>

    <div class="divider"><span>or login with email</span></div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="login-email" placeholder="yourname@email.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="Enter your password"/>
    </div>

    <button class="btn btn-primary btn-block" id="btn-login">
      <i class="fa fa-sign-in-alt"></i> Login
    </button>

    <p style="text-align:center;margin-top:20px;font-size:0.88rem">
      Already have an account?
      <a href="student-register.html">Sign up free</a> |
      <a href="teacher-register.html">Join as Teacher</a>
    </p>
  </div>
</section>

<script src="../js/main.js"></script>
<script type="module">
import { loginUser, loginWithGoogle } from '../js/auth.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
import { auth, db } from '../js/auth.js';
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

// Role-redirect logics untouched
function redirectByRole(role) {
  if (role === 'admin') {
    window.location.href = 'admin-panel.html';
  } else if (role === 'teacher') {
    window.location.href = 'teacher-dashboard.html';
  } else {
    window.location.href = '../index.html';
  }
}

// Already logged in state validation
onAuthStateChanged(auth, async (user) => {
  if (user) {
    const snap = await getDoc(doc(db, 'users', user.uid));
    if (snap.exists()) {
      redirectByRole(snap.data().role);
    }
  }
});

// Email login handler
document.getElementById('btn-login').addEventListener('click', async () => {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) { showToast('Email and password required', 'error'); return; }
  const btn = document.getElementById('btn-login');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Logging in...';
  try {
    const { profile } = await loginUser(email, password);
    showToast('Login successful! ✅', 'success');
    setTimeout(() => redirectByRole(profile?.role), 800);
  } catch (e) {
    if (e.code === 'auth/user-not-found' || e.code === 'auth/invalid-credential') {
      showToast('Email or password incorrect', 'error');
    } else if (e.code === 'auth/wrong-password') {
      showToast('Wrong password', 'error');
    } else {
      showToast('Login failed: ' + e.message, 'error');
    }
    btn.disabled = false;
    btn.innerHTML = '<i class="fa fa-sign-in-alt"></i> Login';
  }
});

// Google login handler
document.getElementById('btn-google').addEventListener('click', async () => {
  try {
    const { profile } = await loginWithGoogle('student');
    showToast('Google login successful! ✅', 'success');
    setTimeout(() => redirectByRole(profile?.role || 'student'), 800);
  } catch (e) {
    showToast('Google login failed: ' + e.message, 'error');
  }
});
</script>
</body>
</html>
